# nginx reverse proxy config for Post 3: Multi-container applications
# nginx listens on port 80 and forwards requests to the 'backend' service

events {}

http {
  server {
    listen 80;

    location / {
      # 'backend' resolves via Docker's internal DNS — compose sets this up automatically
      proxy_pass http://backend:8080;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
